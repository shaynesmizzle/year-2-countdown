<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    .wrapper {
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2rem;
    }

    .timer {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .value {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #fff;
      min-width: 2ch;
      font-variant-numeric: tabular-nums;
    }

    .unit-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
    }

    .sep {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 300;
      color: #333;
      line-height: 1;
      align-self: flex-start;
      margin-top: 0;
    }

    .date-target {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.1em;
    }

    .done {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 700;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="label">Countdown to August 18</div>
    <div class="timer" id="timer">
      <div class="unit">
        <div class="value" id="days">--</div>
        <div class="unit-label">Days</div>
      </div>
      <div class="sep">:</div>
      <div class="unit">
        <div class="value" id="hours">--</div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="sep">:</div>
      <div class="unit">
        <div class="value" id="minutes">--</div>
        <div class="unit-label">Minutes</div>
      </div>
      <div class="sep">:</div>
      <div class="unit">
        <div class="value" id="seconds">--</div>
        <div class="unit-label">Seconds</div>
      </div>
    </div>
    <div class="date-target">August 18, 2026 · 00:00:00</div>
  </div>

  <script>
    const target = new Date('2026-08-18T00:00:00');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function tick() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('timer').innerHTML = '<div class="done">August 18 is here! 🎉</div>';
        return;
      }

      const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent    = pad(days);
      document.getElementById('hours').textContent   = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
